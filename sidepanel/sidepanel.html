<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptFlash</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- 线性图标集（SVG sprite，由 sidepanel.js 注入） -->
  <div id="icon-sprite"></div>

  <div class="app">
    <!-- 顶栏：品牌 + 设置 -->
    <header class="topbar">
      <div class="brand">
        <svg class="ic ic-lg"><use href="#ic-bolt"/></svg>
        <span class="title">PromptFlash</span>
      </div>
      <div class="top-actions">
        <button id="btn-batch" class="icon-btn" title="按分类/标签删除提示词" aria-label="批量删除">
          <svg class="ic"><use href="#ic-batch"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="设置" aria-label="设置">
          <svg class="ic"><use href="#ic-gear"/></svg>
        </button>
      </div>
    </header>

    <!-- ========== 主列表页（唯一列表） ========== -->
    <section class="view view-list" id="view-list">
      <div class="search-wrap">
        <div class="search-field">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
          <input id="search" type="text" placeholder="搜索提示词…（支持拼音/首字母，如 xy）" autocomplete="off" spellcheck="false" />
          <button id="search-clear" class="clear-btn" title="清空" hidden><svg class="ic ic-xs"><use href="#ic-close"/></svg></button>
        </div>
        <button class="icon-btn primary-icon" id="btn-new" title="新建提示词"><svg class="ic"><use href="#ic-plus"/></svg></button>
      </div>

      <div class="filters" id="filters">
        <button class="chip active" data-filter="all">全部</button>
        <button class="chip icon-only" data-filter="favorite" title="收藏"><svg class="ic"><use href="#ic-star"/></svg></button>
        <button class="chip icon-only" data-filter="recent" title="最近使用"><svg class="ic"><use href="#ic-clock"/></svg></button>
      </div>

      <div class="filters scene-row" id="scene-row" hidden></div>

      <main class="results" id="results" tabindex="-1"></main>

      <footer class="statusbar">
        <span id="status-count">0 条</span>
        <span class="io">
          <button class="link-btn" id="btn-export"><svg class="ic"><use href="#ic-export"/></svg> 导出</button>
          <button class="link-btn" id="btn-import"><svg class="ic"><use href="#ic-import"/></svg> 导入</button>
          <button class="link-btn" id="btn-trash"><svg class="ic"><use href="#ic-trash"/></svg> 回收站<span class="trash-count" id="trash-count" hidden>0</span></button>
          <input type="file" id="import-file" accept=".json" hidden />
        </span>
      </footer>
    </section>

    <!-- ========== 提示词详情页（预览/编辑双模式） ========== -->
    <div class="sheet" id="detail-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="detail-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span id="detail-title" class="sheet-title">提示词</span>
        <button class="btn-mini" id="detail-duplicate" title="创建副本" hidden>创建副本</button>
        <button class="btn-mini danger-text" id="detail-delete" hidden>删除</button>
      </div>
      <!-- 模式切换 -->
      <div class="mode-switch">
        <button class="mode-tab active" id="mode-edit" data-mode="edit" title="编辑（按 E 切换）">编辑</button>
        <button class="mode-tab" id="mode-preview" data-mode="preview" title="预览（按 E 切换）">预览</button>
      </div>

      <!-- 预览模式 -->
      <div class="detail-body detail-preview" id="detail-preview" hidden></div>

      <!-- 编辑模式 -->
      <form class="detail-body detail-edit" id="prompt-form" autocomplete="off">
        <div class="field">
          <label>标题 <span class="req">*</span></label>
          <input name="title" required placeholder="给这个提示词起个名字" />
        </div>
        <div class="field">
          <label>简短描述</label>
          <input name="description" placeholder="一句话说明用途（可选）" />
        </div>
        <div class="field">
          <label>分类</label>
          <div class="inline-select">
            <select name="categoryId" id="form-category"></select>
            <button type="button" class="link-btn" id="add-category" title="新建分类"><svg class="ic"><use href="#ic-plus"/></svg></button>
          </div>
        </div>
        <div class="field">
          <label>标签 <span class="hint">逗号分隔</span></label>
          <input name="tags" placeholder="如：邮件, 商务" />
        </div>
        <div class="field">
          <label>适配模型</label>
          <div class="mp-dropdown" id="mp-dropdown">
            <button type="button" class="mp-trigger" id="mp-trigger">
              <span id="mp-trigger-label">未选择</span>
              <svg class="ic"><use href="#ic-expand"/></svg>
            </button>
            <div class="mp-panel" id="mp-panel" hidden></div>
          </div>
        </div>
        <div class="field">
          <label>
            提示词内容 <span class="req">*</span>
            <span class="hint">变量：<code>{{变量名}}</code> <code>{{变量名=默认值}}</code> <code>{{变量名|提示}}</code></span>
          </label>
          <textarea name="content" rows="10" required placeholder="在这里写提示词内容。可使用 {{变量}} 让使用时填值。"></textarea>
        </div>
        <div class="field">
          <label>检测到的变量</label>
          <div class="var-preview" id="var-preview"><span class="muted">暂无变量</span></div>
        </div>
        <button type="button" class="btn primary block" id="detail-save">保存</button>
      </form>
    </div>

    <!-- ========== 分类管理面板（全屏） ========== -->
    <div class="sheet" id="catm-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="catm-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title">管理分类</span>
        <button class="icon-btn primary-icon" id="catm-add" title="新建分类"><svg class="ic"><use href="#ic-plus"/></svg></button>
      </div>
      <div class="sheet-body" id="catm-list"></div>
    </div>

    <!-- ========== 标签管理面板（全屏，作用于当前分类） ========== -->
    <div class="sheet" id="tagm-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="tagm-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title" id="tagm-title">管理标签</span>
        <button class="icon-btn primary-icon" id="tagm-add" title="新建标签"><svg class="ic"><use href="#ic-plus"/></svg></button>
      </div>
      <div class="sheet-body" id="tagm-list"></div>
    </div>

    <!-- ========== 设置面板（全屏） ========== -->
    <div class="sheet" id="settings-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="settings-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title">设置</span>
      </div>
      <div class="sheet-body">
        <div class="setting-item">
          <div class="setting-label"><span>主题</span></div>
          <div class="seg-group" id="set-theme">
            <button type="button" class="seg" data-theme="auto">跟随系统</button>
            <button type="button" class="seg" data-theme="light">亮色</button>
            <button type="button" class="seg" data-theme="dark">暗色</button>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span>默认展示分类数</span>
            <input type="number" class="setting-num" id="set-cat-count" min="0" max="50" />
          </div>
          <input type="range" class="setting-range" id="set-cat-range" min="0" max="20" />
          <div class="setting-desc">分类筛选区默认显示的条数，0 表示全部展示</div>
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span>默认展示标签数</span>
            <input type="number" class="setting-num" id="set-tag-count" min="0" max="50" />
          </div>
          <input type="range" class="setting-range" id="set-tag-range" min="0" max="20" />
          <div class="setting-desc">场景标签行默认显示的条数，0 表示全部展示</div>
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span>供应商-模型管理</span>
            <button type="button" class="btn-mini primary" id="open-mm">管理</button>
          </div>
          <div class="setting-desc">维护供应商与模型清单，并选择在提示词中可见的激活模型</div>
        </div>
        <button type="button" class="btn primary block" id="settings-save">保存</button>
      </div>
    </div>

    <!-- ========== 批量删除面板（按分类+标签筛选，勾选要删除的提示词） ========== -->
    <div class="sheet" id="batch-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="batch-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title" id="batch-title">批量删除</span>
      </div>
      <div class="sheet-body" id="batch-body">
        <!-- 筛选区：两级下拉（一级分类 → 二级标签），复用 .mp-dropdown/.mp-company 视觉 -->
        <div class="bd-filters">
          <div class="mp-dropdown" id="bd-filter-dd">
            <button type="button" class="mp-trigger" id="bd-filter-trigger">
              <span id="bd-filter-label">全部提示词</span>
              <svg class="ic"><use href="#ic-expand"/></svg>
            </button>
            <div class="mp-panel" id="bd-filter-panel" hidden></div>
          </div>
        </div>
        <!-- 统计 + 全选/全不选 -->
        <div class="bd-count-row">
          <span class="bd-count" id="bd-count">匹配 0 条，勾选 0 条</span>
          <span class="bd-sel-links">
            <a href="javascript:void(0)" id="bd-select-all">全选</a>
            <span class="bd-sep">|</span>
            <a href="javascript:void(0)" id="bd-select-none">全不选</a>
          </span>
        </div>
        <div id="bd-list"></div>
      </div>
      <div class="bd-foot">
        <button class="btn danger block" id="bd-delete">删除勾选 (0)</button>
      </div>
    </div>

    <!-- ========== 回收站面板（软删除提示词：还原 / 永久删除） ========== -->
    <div class="sheet" id="trash-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="trash-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title" id="trash-title">回收站</span>
        <button class="icon-btn" id="trash-empty" title="清空回收站"><svg class="ic"><use href="#ic-trash"/></svg></button>
      </div>
      <div class="sheet-body" id="trash-body">
        <div id="trash-list"></div>
      </div>
    </div>

    <!-- ========== 回收站悬浮预览气泡 ========== -->
    <div class="trash-preview" id="trash-preview" hidden></div>

    <!-- ========== 供应商-模型管理面板（单框树：勾选=激活，支持增删改） ========== -->
    <div class="sheet" id="mm-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="mm-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title">供应商-模型管理</span>
        <button class="icon-btn primary-icon" id="mm-add" title="新建"><svg class="ic"><use href="#ic-plus"/></svg></button>
      </div>
      <div class="sheet-body">
        <div class="mm-list" id="mm-cat-list"></div>
      </div>
    </div>

    <!-- ========== 新建/重命名 弹层（模型/供应商通用） ========== -->
    <div class="modal-overlay" id="mm-overlay" hidden>
      <div class="modal small">
        <div class="modal-head">
          <span id="mm-overlay-title">新建模型</span>
          <button class="icon-btn" id="mm-close" aria-label="关闭"><svg class="ic"><use href="#ic-close"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>供应商 <span class="req">*</span></label>
            <div class="inline-select">
              <select id="mm-company"></select>
              <input type="text" id="mm-company-new" placeholder="或输入新供应商" style="flex:1" />
            </div>
          </div>
          <div class="field">
            <label>模型名 <span class="hint" id="mm-model-hint">留空则只新建供应商</span></label>
            <input type="text" id="mm-model-name" placeholder="如 GPT-5.5" />
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="mm-cancel">取消</button>
          <button class="btn primary" id="mm-confirm">添加</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="cat-overlay" hidden>
      <div class="modal small">
        <div class="modal-head">
          <span id="cat-overlay-title">新建/编辑分类</span>
          <button class="icon-btn" id="cat-close" aria-label="关闭"><svg class="ic"><use href="#ic-close"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>分类名称 <span class="req">*</span></label>
            <input id="cat-name" placeholder="如：写作" />
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="cat-cancel">取消</button>
          <button class="btn primary" id="cat-save">保存</button>
        </div>
      </div>
    </div>

    <!-- ========== 确认弹层（替换原生 confirm） ========== -->
    <div class="modal-overlay" id="confirm-overlay" hidden>
      <div class="modal small">
        <div class="modal-head">
          <span id="confirm-title">确认</span>
        </div>
        <div class="modal-body"><div class="confirm-msg" id="confirm-msg"></div></div>
        <div class="modal-actions">
          <button class="btn ghost" id="confirm-cancel">取消</button>
          <button class="btn danger" id="confirm-ok">确定</button>
        </div>
      </div>
    </div>

    <!-- ========== 输入弹层（替换原生 prompt） ========== -->
    <div class="modal-overlay" id="prompt-overlay" hidden>
      <div class="modal small">
        <div class="modal-head">
          <span id="prompt-title">输入</span>
          <button class="icon-btn" id="prompt-close" aria-label="关闭"><svg class="ic"><use href="#ic-close"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="confirm-msg" id="prompt-msg"></div>
          <div class="field"><input id="prompt-input" /></div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="prompt-cancel">取消</button>
          <button class="btn primary" id="prompt-ok">确定</button>
        </div>
      </div>
    </div>

    <!-- ========== 导入确认 ========== -->
    <div class="modal-overlay" id="import-overlay" hidden>
      <div class="modal small">
        <div class="modal-head"><span>导入数据</span><button class="icon-btn" id="import-close"><svg class="ic"><use href="#ic-close"/></svg></button></div>
        <div class="modal-body">
          <p class="import-info">检测到 <b id="import-count">0</b> 条提示词。</p>
          <div class="field">
            <label>导入方式</label>
            <select id="import-mode">
              <option value="merge">合并（内容相同则覆盖，不同则新增）</option>
              <option value="replace">替换（覆盖全部现有数据）</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="import-cancel">取消</button>
          <button class="btn primary" id="import-confirm">导入</button>
        </div>
      </div>
    </div>

    <!-- ========== 变量填充弹层（使用时） ========== -->
    <div class="modal-overlay" id="modal-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <span id="modal-title">填写变量</span>
          <button class="icon-btn" id="modal-close" aria-label="关闭"><svg class="ic"><use href="#ic-close"/></svg></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions">
          <button class="btn ghost" id="modal-copy"><svg class="ic"><use href="#ic-copy"/></svg> 复制</button>
          <button class="btn primary" id="modal-insert"><svg class="ic"><use href="#ic-insert"/></svg> 插入输入框</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>
  </div>

  <script src="../lib/pinyin/pinyin.min.js"></script>
  <script src="../lib/fuzzy.js"></script>
  <script src="../lib/search.js"></script>
  <script src="../lib/template.js"></script>
  <script src="../lib/models.js"></script>
  <script src="../lib/store.js"></script>
  <script src="../seed/seed-data.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
