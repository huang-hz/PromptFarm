<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptHub</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- 线性图标集（SVG sprite，由 sidepanel.js 注入） -->
  <div id="icon-sprite"></div>

  <div class="app">
    <!-- 顶栏：品牌 + 视图切换 + 主题 -->
    <header class="topbar">
      <div class="brand">
        <svg class="ic ic-lg"><use href="#ic-bolt"/></svg>
        <span class="title">PromptHub</span>
      </div>
      <div class="top-actions">
        <div class="view-switch">
          <button class="tab active" data-view="use" title="使用：搜索与使用提示词">使用</button>
          <button class="tab" data-view="manage" title="管理：增删改查">管理</button>
        </div>
        <button id="btn-theme" class="icon-btn" title="切换主题" aria-label="主题">
          <svg class="ic"><use href="#ic-moon"/></svg>
        </button>
      </div>
    </header>

    <!-- ========== 使用视图 ========== -->
    <section class="view view-use active" id="view-use">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        <input id="search" type="text" placeholder="搜索提示词…（支持拼音/首字母，如 xy）" autocomplete="off" spellcheck="false" />
        <button id="search-clear" class="clear-btn" title="清空" hidden><svg class="ic ic-xs"><use href="#ic-close"/></svg></button>
      </div>

      <div class="filters" id="filters">
        <button class="chip active" data-filter="all">全部</button>
        <button class="chip icon-only" data-filter="favorite" title="收藏"><svg class="ic"><use href="#ic-star"/></svg></button>
        <button class="chip icon-only" data-filter="recent" title="最近使用"><svg class="ic"><use href="#ic-clock"/></svg></button>
      </div>

      <div class="filters scene-row" id="scene-row" hidden></div>

      <main class="results" id="results" tabindex="-1"></main>

      <footer class="statusbar">
        <span id="status-count">0 条</span>
        <span class="hint">↑↓ 选择 · Enter 使用 · Ctrl+K 聚焦搜索</span>
      </footer>
    </section>

    <!-- ========== 管理视图 ========== -->
    <section class="view view-manage" id="view-manage" hidden>
      <div class="manage-head">
        <div class="search-box">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
          <input id="m-search" type="text" placeholder="搜索…" autocomplete="off" />
        </div>
        <button class="icon-btn primary-icon" id="btn-new" title="新建提示词"><svg class="ic"><use href="#ic-plus"/></svg></button>
      </div>

      <div class="manage-filters">
        <div class="chip-group">
          <span class="chip-label">分类</span>
          <div class="chip-row" id="m-cat-row">
            <button class="m-chip cat-chip active" data-mcat="all">全部 <span class="cnt" id="m-cat-all">0</span></button>
          </div>
          <button class="manage-tiny-btn" id="btn-manage-cat" title="管理分类（增删改）"><svg class="ic"><use href="#ic-gear"/></svg> 管理分类</button>
        </div>
        <div class="chip-group" id="m-tag-group" hidden>
          <span class="chip-label">场景</span>
          <div class="chip-row" id="m-tag-row"></div>
          <button class="manage-tiny-btn" id="btn-manage-tag" title="管理当前分类的标签（增删改）"><svg class="ic"><use href="#ic-gear"/></svg> 管理标签</button>
        </div>
      </div>

      <main class="manage-list" id="manage-list"></main>

      <footer class="statusbar">
        <span id="m-count">0 条</span>
        <span class="io">
          <button class="link-btn" id="btn-export"><svg class="ic"><use href="#ic-export"/></svg> 导出</button>
          <button class="link-btn" id="btn-import"><svg class="ic"><use href="#ic-import"/></svg> 导入</button>
          <input type="file" id="import-file" accept=".json" hidden />
        </span>
      </footer>
    </section>

    <!-- ========== 编辑器（全屏覆盖） ========== -->
    <div class="sheet" id="editor-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="editor-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span id="editor-title" class="sheet-title">新建提示词</span>
        <button class="btn-mini danger-text" id="editor-delete" hidden>删除</button>
      </div>
      <form class="sheet-body" id="prompt-form" autocomplete="off">
        <div class="field">
          <label>标题 <span class="req">*</span></label>
          <input name="title" required placeholder="给这个提示词起个名字" />
        </div>
        <div class="field">
          <label>简短描述</label>
          <input name="description" placeholder="一句话说明用途（可选）" />
        </div>
        <div class="field">
          <label>分类</label>
          <div class="inline-select">
            <select name="categoryId" id="form-category"></select>
            <button type="button" class="link-btn" id="add-category" title="新建分类"><svg class="ic"><use href="#ic-plus"/></svg></button>
          </div>
        </div>
        <div class="field">
          <label>标签 <span class="hint">逗号分隔</span></label>
          <input name="tags" placeholder="如：邮件, 商务" />
        </div>
        <div class="field">
          <label>
            提示词内容 <span class="req">*</span>
            <span class="hint">变量：<code>{{变量名}}</code> <code>{{变量名=默认值}}</code> <code>{{变量名|提示}}</code></span>
          </label>
          <textarea name="content" rows="10" required placeholder="在这里写提示词内容。可使用 {{变量}} 让使用时填值。"></textarea>
        </div>
        <div class="field">
          <label>检测到的变量</label>
          <div class="var-preview" id="var-preview"><span class="muted">暂无变量</span></div>
        </div>
      </form>
      <div class="sheet-foot">
        <button class="btn primary block" id="editor-save">保存</button>
      </div>
    </div>

    <!-- ========== 分类小弹层（新建/编辑单个分类） ========== -->
    <div class="modal-overlay" id="cat-overlay" hidden>
      <div class="modal small">
        <div class="modal-head">
          <span id="cat-overlay-title">新建/编辑分类</span>
          <button class="icon-btn" id="cat-close" aria-label="关闭"><svg class="ic"><use href="#ic-close"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>分类名称 <span class="req">*</span></label>
            <input id="cat-name" placeholder="如：写作" />
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="cat-cancel">取消</button>
          <button class="btn primary" id="cat-save">保存</button>
        </div>
      </div>
    </div>

    <!-- ========== 分类管理面板（全屏） ========== -->
    <div class="sheet" id="catm-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="catm-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title">管理分类</span>
        <div class="head-btns">
          <button class="icon-btn" id="catm-settings" title="显示设置"><svg class="ic"><use href="#ic-gear"/></svg></button>
          <button class="icon-btn primary-icon" id="catm-add" title="新建分类"><svg class="ic"><use href="#ic-plus"/></svg></button>
        </div>
      </div>
      <div class="sheet-body" id="catm-list"></div>
    </div>

    <!-- ========== 标签管理面板（全屏，作用于当前分类） ========== -->
    <div class="sheet" id="tagm-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="tagm-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title" id="tagm-title">管理标签</span>
        <div class="head-btns">
          <button class="icon-btn" id="tagm-settings" title="显示设置"><svg class="ic"><use href="#ic-gear"/></svg></button>
          <button class="icon-btn primary-icon" id="tagm-add" title="新建标签"><svg class="ic"><use href="#ic-plus"/></svg></button>
        </div>
      </div>
      <div class="sheet-body" id="tagm-list"></div>
    </div>

    <!-- ========== 显示设置面板（全屏） ========== -->
    <div class="sheet" id="settings-sheet" hidden>
      <div class="sheet-head">
        <button class="icon-btn" id="settings-back" title="返回" aria-label="返回"><svg class="ic"><use href="#ic-back"/></svg></button>
        <span class="sheet-title">显示设置</span>
      </div>
      <div class="sheet-body">
        <div class="setting-hint">设置「使用界面」筛选区默认展示多少条分类和标签。超出部分仍可通过搜索访问，0 表示全部展示。</div>
        <div class="setting-item">
          <div class="setting-label">
            <span>默认展示分类数</span>
            <input type="number" class="setting-num" id="set-cat-count" min="0" max="50" />
          </div>
          <input type="range" class="setting-range" id="set-cat-range" min="0" max="20" />
          <div class="setting-desc">使用界面顶部分类筛选区默认显示的条数</div>
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span>默认展示标签数</span>
            <input type="number" class="setting-num" id="set-tag-count" min="0" max="50" />
          </div>
          <input type="range" class="setting-range" id="set-tag-range" min="0" max="20" />
          <div class="setting-desc">使用界面场景标签行默认显示的条数</div>
        </div>
      </div>
      <div class="sheet-foot">
        <button class="btn primary block" id="settings-save">保存</button>
      </div>
    </div>

    <!-- ========== 导入确认 ========== -->
    <div class="modal-overlay" id="import-overlay" hidden>
      <div class="modal small">
        <div class="modal-head"><span>导入数据</span><button class="icon-btn" id="import-close"><svg class="ic"><use href="#ic-close"/></svg></button></div>
        <div class="modal-body">
          <p class="import-info">检测到 <b id="import-count">0</b> 条提示词。</p>
          <div class="field">
            <label>导入方式</label>
            <select id="import-mode">
              <option value="merge">合并（跳过标题已存在的）</option>
              <option value="replace">替换（覆盖全部现有数据）</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="import-cancel">取消</button>
          <button class="btn primary" id="import-confirm">导入</button>
        </div>
      </div>
    </div>

    <!-- ========== 变量填充弹层（使用时） ========== -->
    <div class="modal-overlay" id="modal-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <span id="modal-title">填写变量</span>
          <button class="icon-btn" id="modal-close" aria-label="关闭"><svg class="ic"><use href="#ic-close"/></svg></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions">
          <button class="btn ghost" id="modal-copy"><svg class="ic"><use href="#ic-copy"/></svg> 复制</button>
          <button class="btn primary" id="modal-insert"><svg class="ic"><use href="#ic-insert"/></svg> 插入输入框</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>
  </div>

  <script src="../lib/pinyin/pinyin.min.js"></script>
  <script src="../lib/fuzzy.js"></script>
  <script src="../lib/search.js"></script>
  <script src="../lib/template.js"></script>
  <script src="../lib/store.js"></script>
  <script src="../seed/seed-data.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
